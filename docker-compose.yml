services:
  mysql:
    image: mysql:8.4
    container_name: gophermind_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gophermind
      MYSQL_USER: gophermind
      MYSQL_PASSWORD: gophermind
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: gophermind_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: gophermind_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: gophermind_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network

  rag:
    image: python:3.11-slim
    container_name: gophermind_rag
    working_dir: /workspace/python/rag_service
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gophermind_docs}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-1536}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE:-cosine}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      BGE_RERANK_MODEL: ${BGE_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      BGE_USE_FP16: ${BGE_USE_FP16:-false}
      CHUNK_SIZE: ${CHUNK_SIZE:-600}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
    command: >
      sh -c "
        python -m pip install --upgrade pip setuptools wheel &&
        pip install --no-cache-dir -r requirements.txt &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    depends_on:
      - qdrant
    networks:
      - app_network

  backend:
    image: golang:1.23
    container_name: gophermind_backend
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "9090:9090"
    environment:
      HTTP_ADDR: ":9090"
      MYSQL_DSN: root:root@tcp(mysql:3306)/gophermind?charset=utf8mb4&parseTime=True&loc=Local
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDRS: redis:6379
      RAG_PYTHON_URL: http://rag:8000
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      AUTH_DEV_BYPASS: "false"
      UPLOAD_DIR: /workspace/data/uploads
      UPLOAD_MAX_FILE_SIZE_BYTES: "20971520"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      BGE_BASE_URL: ${BGE_BASE_URL:-http://host.docker.internal:8001}
      BGE_MODEL: ${BGE_MODEL:-bge-reranker-v2-m3}
    command: >
      sh -c "
        go mod tidy &&
        go run ./cmd/server/main.go
      "
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      rag:
        condition: service_started
      qdrant:
        condition: service_started
    restart: on-failure
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: gophermind_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9091:9090"
    volumes:
      - ./deployments/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - alertmanager
    networks:
      - app_network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gophermind_alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./deployments/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    depends_on:
      - alert-webhook
    networks:
      - app_network

  alert-webhook:
    image: python:3.11-slim
    container_name: gophermind_alert_webhook
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      sh -c "
        python /workspace/deployments/monitoring/alert_webhook.py
      "
    ports:
      - "18080:18080"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  alertmanager_data:

secrets:
  jwt_access_secret:
    file: ./deployments/secrets/jwt_access_secret.txt
  jwt_refresh_secret:
    file: ./deployments/secrets/jwt_refresh_secret.txt
