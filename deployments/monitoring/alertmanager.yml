global:
  resolve_timeout: 5m

route:
  receiver: webhook-default
  group_by: ["alertname", "service", "severity"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m

receivers:
  - name: webhook-default
    webhook_configs:
      - url: http://alert-webhook:18080/alerts
        send_resolved: true
